<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垃圾桶</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: "KaiTi", "SimSun", serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 1px solid #333;
            padding-bottom: 30px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 15px;
            color: #eee;
        }

        .subtitle {
            color: #666;
            font-size: 1.2em;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #666;
            padding: 15px 0;
            font-size: 1.4em;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto !important;
            position: relative;
            z-index: 10;
        }

        .tab-btn.active {
            color: #fff;
            border-bottom: 3px solid #9977dd;
            background-color: #2a2438;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        textarea {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #ccc;
            padding: 20px;
            font-size: 1.2em;
            min-height: 180px;
            resize: vertical;
            border-radius: 8px;
            margin-bottom: 25px;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #9977dd;
        }

        button {
            background: transparent;
            border: 1px solid #9977dd;
            color: #9977dd;
            padding: 12px 35px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            font-family: inherit;
            pointer-events: auto !important;
        }

        button:hover {
            background: #9977dd;
            color: #000;
        }

        .note-list {
            margin-top: 40px;
        }

        .note-item {
            padding: 20px 0;
            border-bottom: 1px solid #222;
        }

        .note-content {
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 10px;
            color: #ddd;
        }

        .note-time {
            font-size: 0.95em;
            color: #555;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1>垃圾桶</h1>
        <p class="subtitle">把垃圾话留在这里，不要随地乱扔垃圾</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="goSelf()">我的独白</button>
        <button class="tab-btn" onclick="goAnon()">匿名留言板</button>
    </div>

    <div id="selfTab" class="tab-content active">
        <textarea id="selfInput" placeholder="写下和自己的对话，例如：我：今天有点累 另一个我：慢慢来就好"></textarea>
        <button onclick="saveSelf()">保存独白</button>
        <div id="selfList" class="note-list"></div>
    </div>

    <div id="anonTab" class="tab-content">
        <textarea id="anonInput" placeholder="写下你的心事，所有访客都能看见"></textarea>
        <button onclick="saveAnon()">发布留言</button>
        <div id="anonList" class="note-list"></div>
    </div>

    <script>
        // 已直接填入你的信息，无需修改
        const SUPABASE_URL = "https://uoqpiejzetvblgibtlcv.supabase.co";
        const SUPABASE_KEY = "sb_publishable_e50Ga29Efjmak5StW2pvig_RfY05-Qt";

        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 标签切换
        function goSelf() {
            document.getElementById('selfTab').style.display = 'block';
            document.getElementById('anonTab').style.display = 'none';
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.querySelectorAll('.tab-btn')[1].classList.remove('active');
        }

        function goAnon() {
            document.getElementById('selfTab').style.display = 'none';
            document.getElementById('anonTab').style.display = 'block';
            document.querySelectorAll('.tab-btn')[0].classList.remove('active');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            loadAnon();
        }

        // 我的独白
        function saveSelf() {
            const input = document.getElementById('selfInput');
            const content = input.value.trim();
            if (!content) return alert('请输入内容！');

            const data = JSON.parse(localStorage.getItem('selfNotes') || '[]');
            data.unshift({content: content, time: new Date().toLocaleString()});
            localStorage.setItem('selfNotes', JSON.stringify(data));
            input.value = '';
            renderSelf();
        }

        function renderSelf() {
            const data = JSON.parse(localStorage.getItem('selfNotes') || '[]');
            const list = document.getElementById('selfList');
            list.innerHTML = data.map(note => `
                <div class="note-item">
                    <div class="note-content">${note.content}</div>
                    <div class="note-time">${note.time}</div>
                </div>
            `).join('');
        }

        // 匿名留言
        async function saveAnon() {
            const input = document.getElementById('anonInput');
            const content = input.value.trim();
            if (!content) return alert('请输入留言！');

            const lastPost = localStorage.getItem('lastPost');
            if (lastPost && Date.now() - parseInt(lastPost) < 86400000) {
                return alert('24小时内只能发一条哦~');
            }

            const { error } = await supabase.from('messages').insert([{ content: content }]);
            if (error) {
                alert('发布失败：' + error.message);
                return;
            }

            localStorage.setItem('lastPost', Date.now().toString());
            input.value = '';
            loadAnon();
            alert('发布成功！大家都能看到啦');
        }

        async function loadAnon() {
            const { data: messages, error } = await supabase.from('messages').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('anonList');

            if (error) {
                list.innerHTML = `<div class="note-item"><div class="note-content">加载失败：${error.message}</div></div>`;
                return;
            }

            if (messages.length === 0) {
                list.innerHTML = `<div class="note-item"><div class="note-content">还没有留言，快来第一条吧✨</div></div>`;
                return;
            }

            list.innerHTML = messages.map(msg => `
                <div class="note-item">
                    <div class="note-content">${msg.content}</div>
                    <div class="note-time">${new Date(msg.created_at).toLocaleString()}</div>
                </div>
            `).join('');
        }

        // 页面初始化
        renderSelf();
        loadAnon();
    </script>
</body>
</html>
