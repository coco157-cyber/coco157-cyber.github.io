<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垃圾桶</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: "KaiTi", "SimSun", serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 1px solid #333;
            padding-bottom: 30px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 15px;
            color: #eee;
        }

        .subtitle {
            color: #666;
            font-size: 1.2em;
        }

        /* 核心修复：按钮强制可点击，无JS依赖样式 */
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #666;
            padding: 15px 0;
            font-size: 1.4em;
            cursor: pointer;
            transition: all 0.3s;
            /* 强制提升可点击性 */
            pointer-events: auto !important;
            position: relative;
            z-index: 10;
        }

        .tab-btn.active {
            color: #fff;
            border-bottom: 3px solid #9977dd;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        textarea {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #ccc;
            padding: 20px;
            font-size: 1.2em;
            min-height: 180px;
            resize: vertical;
            border-radius: 8px;
            margin-bottom: 25px;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #9977dd;
        }

        button {
            background: transparent;
            border: 1px solid #9977dd;
            color: #9977dd;
            padding: 12px 35px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            font-family: inherit;
            pointer-events: auto !important;
        }

        button:hover {
            background: #9977dd;
            color: #000;
        }

        .note-list {
            margin-top: 40px;
        }

        .note-item {
            padding: 20px 0;
            border-bottom: 1px solid #222;
        }

        .note-content {
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 10px;
            color: #ddd;
        }

        .note-time {
            font-size: 0.95em;
            color: #555;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1>垃圾桶</h1>
        <p class="subtitle">把垃圾话留在这里，不要随地乱扔垃圾</p>
    </header>

    <!-- 核心修复：用原生onclick，无事件委托，直接绑定 -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchToSelf()">我的独白</button>
        <button class="tab-btn" onclick="switchToAnon()">匿名留言板</button>
    </div>

    <div id="selfTab" class="tab-content active">
        <textarea id="selfInput" placeholder="写下和自己的对话，例如：我：今天有点累 另一个我：慢慢来就好"></textarea>
        <button onclick="saveSelfNote()">保存独白</button>
        <div id="selfList" class="note-list"></div>
    </div>

    <div id="anonTab" class="tab-content">
        <textarea id="anonInput" placeholder="写下你的心事，所有访客都能看见"></textarea>
        <button onclick="saveAnonNote()">发布留言</button>
        <div id="anonList" class="note-list"></div>
    </div>

    <script>
        // ================= 你的 Supabase 信息 =================
        const SUPABASE_URL = "https://uoqpiejzetvblgibtlcv.supabase.co";
        const SUPABASE_KEY = "sb_publishable_e50Ga29Efjmak5StW2pvig_RfY05-Qt";
        // ======================================================

        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 终极修复：直接定义两个切换函数，无任何复杂逻辑
        function switchToSelf() {
            // 隐藏所有内容
            document.getElementById('selfTab').classList.add('active');
            document.getElementById('anonTab').classList.remove('active');
            // 切换按钮状态
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.querySelectorAll('.tab-btn')[1].classList.remove('active');
        }

        function switchToAnon() {
            // 隐藏所有内容
            document.getElementById('selfTab').classList.remove('active');
            document.getElementById('anonTab').classList.add('active');
            // 切换按钮状态
            document.querySelectorAll('.tab-btn')[0].classList.remove('active');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            // 自动加载留言
            loadAnonMessages();
        }

        // 我的独白功能
        function saveSelfNote() {
            const input = document.getElementById('selfInput');
            const content = input.value.trim();
            
            if (!content) {
                alert('请输入内容再保存！');
                return;
            }

            const notes = JSON.parse(localStorage.getItem('selfNotes') || '[]');
            notes.unshift({
                content: content,
                time: new Date().toLocaleString()
            });
            
            localStorage.setItem('selfNotes', JSON.stringify(notes));
            input.value = '';
            renderSelfMessages();
        }

        function renderSelfMessages() {
            const notes = JSON.parse(localStorage.getItem('selfNotes') || '[]');
            const list = document.getElementById('selfList');
            
            list.innerHTML = notes.map(note => `
                <div class="note-item">
                    <div class="note-content">${note.content}</div>
                    <div class="note-time">${note.time}</div>
                </div>
            `).join('');
        }

        // 匿名留言功能
        async function saveAnonNote() {
            const input = document.getElementById('anonInput');
            const content = input.value.trim();
            
            if (!content) {
                alert('请输入留言内容！');
                return;
            }

            // 24小时防刷屏限制
            const lastPost = localStorage.getItem('lastAnonPost');
            if (lastPost) {
                const diff = Date.now() - parseInt(lastPost);
                if (diff < 24 * 60 * 60 * 1000) {
                    alert('24小时内只能发布一条留言哦~');
                    return;
                }
            }

            // 提交到数据库
            const { error } = await supabase
                .from('messages')
                .insert([{ content: content }]);

            if (error) {
                alert('发布失败：' + error.message);
                console.error(error);
                return;
            }

            localStorage.setItem('lastAnonPost', Date.now().toString());
            input.value = '';
            loadAnonMessages();
            alert('留言发布成功，大家都能看到啦！');
        }

        async function loadAnonMessages() {
            const { data: messages, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: false });

            const list = document.getElementById('anonList');
            
            if (error) {
                list.innerHTML = `<div class="note-item"><div class="note-content">数据加载失败，请检查配置</div></div>`;
                return;
            }

            if (messages.length === 0) {
                list.innerHTML = `<div class="note-item"><div class="note-content">暂无留言，快来发布第一条吧✨</div></div>`;
                return;
            }

            list.innerHTML = messages.map(msg => `
                <div class="note-item">
                    <div class="note-content">${msg.content}</div>
                    <div class="note-time">${new Date(msg.created_at).toLocaleString()}</div>
                </div>
            `).join('');
        }

        // 页面初始化
        renderSelfMessages();
        loadAnonMessages();
    </script>
</body>
</html>
