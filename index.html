<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垃圾桶</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: "KaiTi", "SimSun", serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 30px;
        }

        h1 {
            font-size: 2.8em;
            margin-bottom: 15px;
            color: #eee;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #666;
            padding: 15px 0;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #fff;
            border-bottom: 3px solid #9977dd;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        textarea {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #ccc;
            padding: 18px;
            font-size: 1.1em;
            min-height: 150px;
            resize: vertical;
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #9977dd;
        }

        button {
            background: transparent;
            border: 1px solid #9977dd;
            color: #9977dd;
            padding: 12px 30px;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            font-family: inherit;
        }

        button:hover {
            background: #9977dd;
            color: #000;
        }

        .note-list {
            margin-top: 40px;
        }

        .note-item {
            padding: 20px 0;
            border-bottom: 1px solid #222;
        }

        .note-content {
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 10px;
            color: #ddd;
        }

        .note-time {
            font-size: 0.9em;
            color: #555;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1>垃圾桶</h1>
        <p class="subtitle">把垃圾话留在这里，不要随地乱扔垃圾</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" data-tab="self">我的独白</button>
        <button class="tab-btn" data-tab="anon">匿名留言板</button>
    </div>

    <div id="self" class="tab-content active">
        <textarea id="selfInput" placeholder="写下和自己的对话，例如：我：今天有点累 另一个我：慢慢来就好"></textarea>
        <button id="saveSelfBtn">保存独白</button>
        <div id="selfList" class="note-list"></div>
    </div>

    <div id="anon" class="tab-content">
        <textarea id="anonInput" placeholder="写下你的心事，所有访客都能看见"></textarea>
        <button id="saveAnonBtn">发布留言</button>
        <div id="anonList" class="note-list"></div>
    </div>

    <script>
        // ================= 请替换成你自己的 Supabase 信息 =================
        const SUPABASE_URL = "https://uoqpiejzetvblgibtlcv.supabase.co";
        const SUPABASE_KEY = "sb_publishable_e50Ga29Efjmak5StW2pvig_RfY05-Qt";
        // =================================================================

        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 标签切换 - 用 addEventListener 方式，兼容性更好
        const tabButtons = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabButtons.forEach(button => {
            button.addEventListener('click', function() {
                const targetTab = this.getAttribute('data-tab');
                
                // 清除所有状态
                tabButtons.forEach(btn => btn.classList.remove('active'));
                tabContents.forEach(content => content.classList.remove('active'));
                
                // 激活当前标签
                this.classList.add('active');
                document.getElementById(targetTab).classList.add('active');

                // 切换到留言板时自动加载数据
                if (targetTab === 'anon') {
                    loadAnonMessages();
                }
            });
        });

        // 我的独白功能
        document.getElementById('saveSelfBtn').addEventListener('click', function() {
            const input = document.getElementById('selfInput');
            const content = input.value.trim();
            
            if (!content) {
                alert('请输入内容再保存！');
                return;
            }

            const notes = JSON.parse(localStorage.getItem('selfNotes') || '[]');
            notes.unshift({
                content: content,
                time: new Date().toLocaleString()
            });
            
            localStorage.setItem('selfNotes', JSON.stringify(notes));
            input.value = '';
            renderSelfMessages();
        });

        function renderSelfMessages() {
            const notes = JSON.parse(localStorage.getItem('selfNotes') || '[]');
            const list = document.getElementById('selfList');
            
            list.innerHTML = notes.map(note => `
                <div class="note-item">
                    <div class="note-content">${note.content}</div>
                    <div class="note-time">${note.time}</div>
                </div>
            `).join('');
        }

        // 匿名留言功能
        document.getElementById('saveAnonBtn').addEventListener('click', async function() {
            const input = document.getElementById('anonInput');
            const content = input.value.trim();
            
            if (!content) {
                alert('请输入留言内容！');
                return;
            }

            // 24小时防刷屏限制
            const lastPost = localStorage.getItem('lastAnonPost');
            if (lastPost) {
                const diff = Date.now() - parseInt(lastPost);
                if (diff < 24 * 60 * 60 * 1000) {
                    alert('24小时内只能发布一条留言哦~');
                    return;
                }
            }

            // 提交到数据库
            const { error } = await supabase
                .from('messages')
                .insert([{ content: content }]);

            if (error) {
                alert('发布失败：' + error.message);
                console.error(error);
                return;
            }

            localStorage.setItem('lastAnonPost', Date.now().toString());
            input.value = '';
            loadAnonMessages();
            alert('留言发布成功，大家都能看到啦！');
        });

        async function loadAnonMessages() {
            const { data: messages, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: false });

            const list = document.getElementById('anonList');
            
            if (error) {
                list.innerHTML = `<div class="note-item"><div class="note-content">数据加载失败，请检查配置</div></div>`;
                return;
            }

            if (messages.length === 0) {
                list.innerHTML = `<div class="note-item"><div class="note-content">暂无留言，快来发布第一条吧✨</div></div>`;
                return;
            }

            list.innerHTML = messages.map(msg => `
                <div class="note-item">
                    <div class="note-content">${msg.content}</div>
                    <div class="note-time">${new Date(msg.created_at).toLocaleString()}</div>
                </div>
            `).join('');
        }

        // 页面初始化
        renderSelfMessages();
        loadAnonMessages();
    </script>
</body>
</html>
