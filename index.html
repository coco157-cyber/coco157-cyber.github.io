<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ky okk</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "KaiTi", "SimSun", serif;
        }
        body {
            background-color: #000;
            color: #ccc;
            max-width: 650px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.2em;
            margin-bottom: 8px;
            color: #eee;
        }
        .subtitle {
            font-size: 1em;
            color: #888;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #888;
            padding: 12px;
            font-size: 1.1em;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            color: #fff;
            border-bottom-color: #fff;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        textarea {
            width: 100%;
            background: #111;
            border: 1px solid #444;
            color: #ccc;
            padding: 12px;
            font-size: 1em;
            min-height: 100px;
            resize: vertical;
            margin-bottom: 15px;
        }
        button {
            background: transparent;
            border: 1px solid #ccc;
            color: #ccc;
            padding: 10px 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #ccc;
            color: #000;
        }
        .note-list {
            margin-top: 30px;
        }
        .note-item {
            padding: 15px 0;
            border-bottom: 1px solid #222;
        }
        .note-content {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .note-time {
            font-size: 0.85em;
            color: #666;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1>垃圾话</h1>
        <p class="subtitle">把心事说给风听</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" data-tab="self">我的独白</button>
        <button class="tab-btn" data-tab="anon">匿名留言板</button>
    </div>

    <div id="self" class="tab-content active">
        <textarea id="selfInput" placeholder="写下和自己的对话，比如：我：今天有点累 另一个我：没关系，休息一下就好"></textarea>
        <button onclick="addSelfNote()">保存独白</button>
        <div id="selfList" class="note-list"></div>
    </div>

    <div id="anon" class="tab-content">
        <textarea id="anonInput" placeholder="写下你的匿名心事，所有人都能看到"></textarea>
        <button onclick="addAnonNote()">发布留言</button>
        <div id="anonList" class="note-list"></div>
    </div>

    <script>
        // ========== 在这里替换成你自己的 Supabase 信息 ==========
        const SUPABASE_URL = "ap-northeast-2";
        const SUPABASE_KEY = "uoqpiejzetvblgibtlcv";
        // =======================================================

        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 修复标签切换
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', function(){
                const targetTab = this.getAttribute('data-tab');
                // 清除所有激活状态
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                // 激活当前
                this.classList.add('active');
                document.getElementById(targetTab).classList.add('active');
                // 切换到留言板自动加载数据
                if(targetTab === 'anon'){
                    renderAnon();
                }
            });
        });

        // 我的独白（本地存储）
        function addSelfNote() {
            const input = document.getElementById('selfInput');
            const content = input.value.trim();
            if (!content) return alert('请输入内容');

            const notes = JSON.parse(localStorage.getItem('selfNotes') || '[]');
            notes.unshift({
                content: content,
                time: new Date().toLocaleString()
            });
            localStorage.setItem('selfNotes', JSON.stringify(notes));
            input.value = '';
            renderSelf();
        }

        function renderSelf() {
            const notes = JSON.parse(localStorage.getItem('selfNotes') || '[]');
            const list = document.getElementById('selfList');
            list.innerHTML = notes.map(note => `
                <div class="note-item">
                    <div class="note-content">${note.content}</div>
                    <div class="note-time">${note.time}</div>
                </div>
            `).join('');
        }

        // 匿名留言（云端数据库，所有人互通）
        async function addAnonNote() {
            const input = document.getElementById('anonInput');
            const content = input.value.trim();
            if (!content) return alert('请输入留言内容');

            // 24小时限制
            const lastPost = localStorage.getItem('lastAnonPost');
            if (lastPost) {
                const diff = Date.now() - parseInt(lastPost);
                if (diff < 24 * 60 * 60 * 1000) {
                    return alert('24小时内只能发布一条留言');
                }
            }

            const { error } = await supabase
                .from('messages')
                .insert([{ content: content }]);

            if (error) {
                alert('发布失败：' + error.message);
                return;
            }

            localStorage.setItem('lastAnonPost', Date.now().toString());
            input.value = '';
            renderAnon();
            alert('发布成功，所有人都能看到啦！');
        }

        async function renderAnon() {
            const { data: messages, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: false });

            const list = document.getElementById('anonList');
            if (error) {
                list.innerHTML = `<div class="note-item"><div class="note-content">加载失败，请检查网络或配置</div></div>`;
                return;
            }
            if (messages.length === 0) {
                list.innerHTML = `<div class="note-item"><div class="note-content">还没有留言，快来第一条吧</div></div>`;
                return;
            }
            list.innerHTML = messages.map(msg => `
                <div class="note-item">
                    <div class="note-content">${msg.content}</div>
                    <div class="note-time">${new Date(msg.created_at).toLocaleString()}</div>
                </div>
            `).join('');
        }

        // 页面初始化
        renderSelf();
        renderAnon();
    </script>
</body>
</html>
