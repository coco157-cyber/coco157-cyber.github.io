<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ========== 在这里修改网页标题 ========== -->
    <title>self-talking | 匿名树洞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 字体+全局样式 仿手写简约风 */
        @font-face {
            font-family: HandFont;
            src: local("KaiTi"), local("STKaiti"), local("SimSun");
        }
        body {
            background-color: #000000;
            color: #f0f0f0;
            font-family: HandFont, system-ui, sans-serif;
            max-width: 650px;
            margin: 0 auto;
            padding: 50px 20px;
            line-height: 1.9;
        }
        /* 头部标题区域 */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        /* ========== 在这里修改主站名 ========== */
        .main-title {
            font-size: 28px;
            letter-spacing: 4px;
            opacity: 0.92;
            margin-bottom: 8px;
        }
        /* ========== 在这里修改副标题 ========== */
        .sub-title {
            font-size: 14px;
            color: #888;
            letter-spacing: 1px;
        }
        /* 切换标签栏 */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 35px;
            font-size: 15px;
        }
        .tab-nav span {
            cursor: pointer;
            padding: 6px 12px;
            opacity: 0.6;
            transition: 0.3s;
        }
        .tab-nav span.active {
            border-bottom: 1px solid #f0f0f0;
            opacity: 1;
        }
        /* 输入框区域 */
        .input-wrap {
            margin-bottom: 35px;
        }
        textarea {
            width: 100%;
            min-height: 110px;
            background: #111;
            border: 1px solid #333;
            color: #f0f0f0;
            padding: 16px;
            border-radius: 3px;
            font-family: inherit;
            font-size: 16px;
            resize: none;
            outline: none;
        }
        button {
            margin-top: 12px;
            background: transparent;
            border: 1px solid #f0f0f0;
            color: #f0f0f0;
            padding: 9px 24px;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
        }
        button:hover {
            background: #f0f0f0;
            color: #000;
        }
        /* 内容列表单条样式 */
        .list-item {
            border-bottom: 1px solid #222;
            padding: 22px 0;
        }
        .time-text {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        .self-left {
            text-align: left;
            margin-bottom: 8px;
        }
        .self-right {
            text-align: right;
            color: #aaa;
        }
        .anon-content {
            color: #c9c9c9;
        }
        /* 标签页切换隐藏 */
        .tab-content {
            display: block;
        }
        .hide {
            display: none;
        }
        .tip {
            font-size: 13px;
            color: #555;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- 头部标题 -->
    <div class="header">
        <h1 class="main-title">coco self-talking</h1>
        <p class="sub-title">收容所有无处安放的情绪</p>
    </div>

    <!-- 导航标签 -->
    <div class="tab-nav">
        <span class="active" onclick="switchTab('self')">我的独白</span>
        <span onclick="switchTab('anon')">匿名留言板</span>
    </div>

    <!-- 板块1：你的专属自我对话区 -->
    <div id="self" class="tab-content">
        <p class="tip">和自己对话，记录日常心事</p>
        <div class="input-wrap">
            <textarea id="selfText" placeholder="格式参考：我：xxx 另一个我：xxx"></textarea>
            <button onclick="addSelfNote()">保存记录</button>
        </div>
        <div id="selfList"></div>
    </div>

    <!-- 板块2：全员匿名留言区（所有人可发） -->
    <div id="anon" class="tab-content hide">
        <p class="tip">匿名发言，想说什么都可以，无昵称、无头像</p>
        <div class="input-wrap">
            <textarea id="anonText" placeholder="在这里写下吐槽、心事、碎碎念..."></textarea>
            <button onclick="addAnonNote()">发布留言</button>
        </div>
        <div id="anonList"></div>
    </div>

    <script>
        // 本地存储初始化
        let selfData = JSON.parse(localStorage.getItem("selfData")) || [];
        let anonData = JSON.parse(localStorage.getItem("anonData")) || [];
        let lastSendTime = localStorage.getItem("lastSendTime") || 0;
        const dayTime = 24 * 60 * 60 * 1000; // 24小时毫秒数

        // 切换标签页
        function switchTab(tabId) {
            // 隐藏所有板块
            document.querySelectorAll(".tab-content").forEach(el => el.classList.add("hide"));
            // 取消所有选中状态
            document.querySelectorAll(".tab-nav span").forEach(el => el.classList.remove("active"));
            // 显示当前板块
            document.getElementById(tabId).classList.remove("hide");
            event.target.classList.add("active");
        }

        // 渲染【自我对话】列表
        function renderSelf() {
            const box = document.getElementById("selfList");
            box.innerHTML = "";
            selfData.forEach(item => {
                let html = `
                    <div class="list-item">
                        <div class="time-text">${item.time}</div>
                        <div class="self-left">我：${item.me}</div>
                        ${item.other ? `<div class="self-right">另一个我：${item.other}</div>` : ""}
                    </div>
                `;
                box.innerHTML += html;
            })
        }

        // 添加自我对话内容
        function addSelfNote() {
            let val = document.getElementById("selfText").value.trim();
            if (!val) return;
            let meStr = val.split("另一个我：")[0].replace("我：", "").trim();
            let otherStr = val.split("另一个我：")[1]?.trim() || "";
            let nowTime = new Date().toLocaleString();

            selfData.unshift({ me: meStr, other: otherStr, time: nowTime });
            localStorage.setItem("selfData", JSON.stringify(selfData));
            document.getElementById("selfText").value = "";
            renderSelf();
        }

        // 渲染【匿名留言】列表
        function renderAnon() {
            const box = document.getElementById("anonList");
            box.innerHTML = "";
            anonData.forEach(item => {
                let html = `
                    <div class="list-item">
                        <div class="time-text">${item.time}</div>
                        <div class="anon-content">${item.content}</div>
                    </div>
                `;
                box.innerHTML += html;
            })
        }

        // 添加匿名留言（24小时限制单用户一条）
        function addAnonNote() {
            let now = Date.now();
            // 24小时限制，不想限制直接删除这段判断即可
            if (now - lastSendTime < dayTime) {
                alert("24小时内仅可发布一条留言，明天再来吧~");
                return;
            }
            let val = document.getElementById("anonText").value.trim();
            if (!val) return;

            let nowTime = new Date().toLocaleString();
            anonData.unshift({ content: val, time: nowTime });
            anonData.sort(() => 0.5 - Math.random()); // 随机打乱顺序，更有树洞氛围
            localStorage.setItem("anonData", JSON.stringify(anonData));
            localStorage.setItem("lastSendTime", now);
            document.getElementById("anonText").value = "";
            renderAnon();
        }

        // 页面初始加载渲染
        renderSelf();
        renderAnon();
    </script>
</body>
</html>
