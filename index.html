<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垃圾桶</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "KaiTi", "SimSun", serif;
        }
        body {
            background: #000;
            color: #fff;
            max-width: 700px;
            margin: 0 auto;
            padding: 50px 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 1.1em;
        }
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #666;
            padding: 15px 0;
            font-size: 1.3em;
            cursor: pointer;
        }
        .tab-btn.active {
            color: #fff;
            border-bottom: 3px solid #9977dd;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        textarea {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #ccc;
            padding: 15px;
            font-size: 1.1em;
            min-height: 150px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        button {
            background: transparent;
            border: 1px solid #9977dd;
            color: #9977dd;
            padding: 10px 30px;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background: #9977dd;
            color: #000;
        }
        .list {
            margin-top: 30px;
        }
        .item {
            padding: 15px 0;
            border-bottom: 1px solid #222;
        }
        .time {
            font-size: 0.9em;
            color: #555;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1>垃圾桶</h1>
        <p class="subtitle">把垃圾话留在这里，不要随地乱扔垃圾</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('self')">我的独白</button>
        <button class="tab-btn" onclick="showTab('anon')">匿名留言板</button>
    </div>

    <div id="self" class="tab-content active">
        <textarea id="selfInput" placeholder="写下和自己的对话"></textarea>
        <button onclick="saveSelf()">保存独白</button>
        <div id="selfList" class="list"></div>
    </div>

    <div id="anon" class="tab-content">
        <textarea id="anonInput" placeholder="写下你的心事"></textarea>
        <button onclick="saveAnon()">发布留言</button>
        <div id="anonList" class="list"></div>
    </div>

    <script>
        // 切换标签（最基础写法，100%能点击）
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // 我的独白（本地存储）
        function saveSelf() {
            const input = document.getElementById('selfInput');
            const text = input.value.trim();
            if (!text) return alert('请输入内容！');
            
            const notes = JSON.parse(localStorage.getItem('selfNotes') || '[]');
            notes.unshift({content: text, time: new Date().toLocaleString()});
            localStorage.setItem('selfNotes', JSON.stringify(notes));
            input.value = '';
            renderSelf();
        }

        function renderSelf() {
            const notes = JSON.parse(localStorage.getItem('selfNotes') || '[]');
            document.getElementById('selfList').innerHTML = notes.map(n => `
                <div class="item">
                    <div>${n.content}</div>
                    <div class="time">${n.time}</div>
                </div>
            `).join('');
        }

        // 匿名留言（本地模拟，先跑起来再说）
        function saveAnon() {
            const input = document.getElementById('anonInput');
            const text = input.value.trim();
            if (!text) return alert('请输入内容！');
            
            const messages = JSON.parse(localStorage.getItem('anonMessages') || '[]');
            messages.unshift({content: text, time: new Date().toLocaleString()});
            localStorage.setItem('anonMessages', JSON.stringify(messages));
            input.value = '';
            renderAnon();
        }

        function renderAnon() {
            const messages = JSON.parse(localStorage.getItem('anonMessages') || '[]');
            document.getElementById('anonList').innerHTML = messages.map(m => `
                <div class="item">
                    <div>${m.content}</div>
                    <div class="time">${m.time}</div>
                </div>
            `).join('');
        }

        // 初始化
        renderSelf();
        renderAnon();
    </script>
</body>
</html>
