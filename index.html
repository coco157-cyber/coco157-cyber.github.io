<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名树洞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "KaiTi", "SimSun", serif;
        }
        body {
            background-color: #000;
            color: #ccc;
            max-width: 650px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.2em;
            margin-bottom: 8px;
            color: #eee;
        }
        .subtitle {
            font-size: 1em;
            color: #888;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #888;
            padding: 12px;
            font-size: 1.1em;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            color: #fff;
            border-bottom-color: #fff;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        textarea {
            width: 100%;
            background: #111;
            border: 1px solid #444;
            color: #ccc;
            padding: 12px;
            font-size: 1em;
            min-height: 100px;
            resize: vertical;
            margin-bottom: 15px;
        }
        button {
            background: transparent;
            border: 1px solid #ccc;
            color: #ccc;
            padding: 10px 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #ccc;
            color: #000;
        }
        .note-list {
            margin-top: 30px;
        }
        .note-item {
            padding: 15px 0;
            border-bottom: 1px solid #222;
        }
        .note-content {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .note-time {
            font-size: 0.85em;
            color: #666;
        }
    </style>
    <!-- 引入 Supabase 官方 SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1>匿名树洞</h1>
        <p class="subtitle">把心事说给风听</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('self')">我的独白</button>
        <button class="tab-btn" onclick="switchTab('anon')">匿名留言板</button>
    </div>

    <div id="self" class="tab-content active">
        <textarea id="selfInput" placeholder="写下和自己的对话，比如：我：今天有点累 另一个我：没关系，休息一下就好"></textarea>
        <button onclick="addSelfNote()">保存独白</button>
        <div id="selfList" class="note-list"></div>
    </div>

    <div id="anon" class="tab-content">
        <textarea id="anonInput" placeholder="写下你的匿名心事，所有人都能看到"></textarea>
        <button onclick="addAnonNote()">发布留言</button>
        <div id="anonList" class="note-list"></div>
    </div>

    <script>
        // ------------ 在这里替换成你自己的 Supabase 信息 ------------
        const SUPABASE_URL = "ap-northeast-2";
        const SUPABASE_KEY = "uoqpiejzetvblgibtlcv";
        // ----------------------------------------------------------

        // 初始化 Supabase 客户端
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 标签页切换
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            if (tabId === 'anon') renderAnon();
        }

        // -------------------- 我的独白（本地存储） --------------------
        function addSelfNote() {
            const input = document.getElementById('selfInput');
            const content = input.value.trim();
            if (!content) return alert('请输入内容');

            const notes = JSON.parse(localStorage.getItem('selfNotes') || '[]');
            notes.unshift({
                content: content,
                time: new Date().toLocaleString()
            });
            localStorage.setItem('selfNotes', JSON.stringify(notes));
            input.value = '';
            renderSelf();
        }

        function renderSelf() {
            const notes = JSON.parse(localStorage.getItem('selfNotes') || '[]');
            const list = document.getElementById('selfList');
            list.innerHTML = notes.map(note => `
                <div class="note-item">
                    <div class="note-content">${note.content}</div>
                    <div class="note-time">${note.time}</div>
                </div>
            `).join('');
        }

        // -------------------- 匿名留言板（Supabase 数据库） --------------------
        async function addAnonNote() {
            const input = document.getElementById('anonInput');
            const content = input.value.trim();
            if (!content) return alert('请输入留言内容');

            // 24小时防刷屏限制
            const lastPost = localStorage.getItem('lastAnonPost');
            if (lastPost) {
                const diff = Date.now() - parseInt(lastPost);
                if (diff < 24 * 60 * 60 * 1000) {
                    return alert('留言太频繁啦，24小时内只能发布一条');
                }
            }

            // 写入数据库
            const { error } = await supabase
                .from('messages')
                .insert([{ content: content }]);

            if (error) {
                alert('发布失败：' + error.message);
                return;
            }

            localStorage.setItem('lastAnonPost', Date.now().toString());
            input.value = '';
            renderAnon();
            alert('留言发布成功！所有人都能看到啦');
        }

        async function renderAnon() {
            const { data: messages, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('加载留言失败：', error);
                return;
            }

            const list = document.getElementById('anonList');
            list.innerHTML = messages.map(msg => `
                <div class="note-item">
                    <div class="note-content">${msg.content}</div>
                    <div class="note-time">${new Date(msg.created_at).toLocaleString()}</div>
                </div>
            `).join('');
        }

        // 初始化渲染
        renderSelf();
        renderAnon();
    </script>
</body>
</html>
